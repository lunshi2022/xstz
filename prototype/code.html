<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Asset Details</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6",
                        "background-light": "#F9FAFB",
                        "background-dark": "#111827",
                        "card-light": "#FFFFFF",
                        "card-dark": "#1F2937",
                        "danger": "#EF4444",
                    },
                    fontFamily: {
                        display: ["Inter", "system-ui", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "12px",
                    },
                },
            },
        };
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<div class="h-12 w-full"></div>
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 ios-blur px-4 py-3 flex items-center border-b border-slate-200/50 dark:border-slate-800/50">
<button class="p-2 -ml-2 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full transition-colors">
<span class="material-icons-round text-2xl">arrow_back</span>
</button>
<h1 class="ml-2 text-xl font-bold tracking-tight text-slate-900 dark:text-white">资产详情</h1>
<div class="ml-auto flex gap-3">
<button class="p-2 hover:bg-slate-200/50 dark:hover:bg-slate-800/50 rounded-full transition-colors">
<span class="material-icons-round text-2xl">share</span>
</button>
</div>
</header>
<main class="p-4 pb-32 space-y-4">
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex items-center justify-between mb-6">
<h2 class="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">基本信息</h2>
<span class="px-2 py-1 bg-primary/10 text-primary text-xs font-bold rounded-md">代码: 000333</span>
</div>
<div class="space-y-4">
<div class="flex justify-between items-center">
<span class="text-slate-500 dark:text-slate-400">名称</span>
<span class="font-semibold text-lg">优质成长资产</span>
</div>
<div class="flex justify-between items-center">
<span class="text-slate-500 dark:text-slate-400">资产类型</span>
<div class="flex items-center text-primary font-medium cursor-pointer">
<span>股票</span>
<span class="material-icons-round text-lg ml-1">expand_more</span>
</div>
</div>
</div>
</section>
<section class="bg-card-light dark:bg-card-dark rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800">
<h2 class="text-sm font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-6">持仓信息</h2>
<div class="space-y-6">
<div class="flex justify-between items-center group cursor-pointer">
<span class="text-slate-500 dark:text-slate-400">持仓份额</span>
<div class="flex items-center text-primary font-semibold text-lg">
<span>100</span>
<span class="material-icons-round text-slate-300 dark:text-slate-600 ml-1">chevron_right</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
<p class="text-xs text-slate-400 dark:text-slate-500 mb-1">成本价格</p>
<p class="font-bold text-lg">¥1.000</p>
</div>
<div class="p-3 bg-slate-50 dark:bg-slate-800/50 rounded-xl">
<p class="text-xs text-slate-400 dark:text-slate-500 mb-1">当前价格</p>
<div class="flex flex-col">
<p class="font-bold text-lg">¥78.910</p>
<p class="text-xs font-bold text-emerald-500 dark:text-emerald-400">+2.45%</p>
</div>
</div>
</div>
<div class="flex justify-between items-center group cursor-pointer border-t border-slate-100 dark:border-slate-800 pt-4">
<span class="text-slate-500 dark:text-slate-400">目标占比</span>
<div class="flex items-center text-primary font-semibold text-lg">
<span>15.00%</span>
<span class="material-icons-round text-slate-300 dark:text-slate-600 ml-1">chevron_right</span>
</div>
</div>
</div>
</section>
<button class="w-full flex justify-between items-center bg-card-light dark:bg-card-dark rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-800 active:scale-[0.98] transition-transform">
<div class="flex items-center">
<div class="w-10 h-10 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center mr-3">
<span class="material-icons-round text-slate-500 dark:text-slate-400">receipt_long</span>
</div>
<span class="font-semibold">交易记录</span>
</div>
<div class="flex items-center text-slate-400">
<span class="text-sm mr-1">1笔记录</span>
<span class="material-icons-round">chevron_right</span>
</div>
</button>
</main>
<div class="fixed bottom-0 inset-x-0 bg-background-light/80 dark:bg-background-dark/80 ios-blur border-t border-slate-200/50 dark:border-slate-800/50 p-4 pb-8 flex justify-center">
<button class="px-8 py-3.5 bg-danger/10 text-danger font-bold rounded-2xl active:scale-[0.97] transition-all flex items-center justify-center gap-2">
<span class="material-icons-round">delete_outline</span>
<span>删除资产</span>
</button>
</div>

</body></html>
